version: '3.8'

services:
  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SIGNALING_URL=ws://localhost:3002
    depends_on:
      - signaling
    restart: always

  # Socket.IO Signaling Server
  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signal
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - SIGNALING_PORT=3002
    restart: always
